<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecionando...</title>
    <style>
        /* Estilos globais - Tema Escuro */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0b0e11; /* Preto fosco da Binance */
            color: #eaecef;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Container principal */
        .container {
            background-color: #1e2329; /* Cinza muito escuro */
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            border: 1px solid #333;
        }

        h1 {
            color: #ffffff;
            font-size: 26px;
            margin-bottom: 15px;
        }

        p {
            font-size: 16px;
            color: #b7bdc6; /* Texto secundário acinzentado */
            line-height: 1.6;
        }

        .highlight {
            font-weight: bold;
            color: #f3ba2f; /* Amarelo vibrante */
            font-size: 48px;
            display: block;
            margin: 25px 0;
            text-shadow: 0 0 15px rgba(243, 186, 47, 0.3);
        }

        /* Botão de fallback */
        .btn {
            display: inline-block;
            margin-top: 25px;
            padding: 15px 30px;
            background-color: #f3ba2f;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #ffca42;
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.4);
        }

        /* Animação suave para o contador */
        #contador {
            transition: all 0.2s;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Redirecionando</h1>
        <p>Aguarde um instante. Estamos conectando você ao <strong>MVP Binance</strong>.</p>
        
        <div id="countdown-container">
            <span id="contador" class="highlight">5</span>
        </div>

        <p>Se o redirecionamento falhar, use o botão:</p>
        <a href="https://ldk4.github.io/MVPbinance/" id="link-manual" class="btn">ACESSAR AGORA</a>
    </div>

    <script>
        // Configurações
        let tempoRestante = 5; 
        const urlDestino = "https://ldk4.github.io/MVPbinance/"; 
        
        const elementoContador = document.getElementById('contador');

        // Lógica da contagem regressiva
        const contagem = setInterval(() => {
            tempoRestante--;
            
            if (tempoRestante >= 0) {
                elementoContador.textContent = tempoRestante;
            }

            if (tempoRestante <= 0) {
                clearInterval(contagem);
                window.location.href = urlDestino;
            }
        }, 1000);
    </script>

</body>
</html>
