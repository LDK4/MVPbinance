<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="manifest" href="manifest.json">
    <script>
      // Mudamos para v=2.1 para forçar o Chrome a atualizar o Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js?v=2.1');
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MVP Balance - Financeiro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; min-height: 100vh; box-sizing: border-box; }
        
        .card-saldo { background: #111; padding: 30px; border-radius: 25px; width: 320px; margin-bottom: 20px; border: 1px solid #222; text-align: center; }
        #valor-saldo { font-size: 3rem; margin: 10px 0; font-weight: bold; }
        
        .card-input { background: #111; padding: 25px; border-radius: 25px; width: 310px; border: 1px solid #222; margin-bottom: 20px; }
        input { background: #000; border: 1px solid #333; color: white; padding: 15px; margin: 8px 0; width: 100%; border-radius: 15px; font-size: 1.1rem; outline: none; box-sizing: border-box; }
        
        .botoes { display: flex; gap: 10px; margin-top: 15px; }
        button { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-recebi { background: #2ecc71; color: white; }
        .btn-gastei { background: #e74c3c; color: white; }

        .navegacao-mes { display: flex; align-items: center; justify-content: space-between; width: 310px; margin: 10px 0 25px 0; background: #111; padding: 12px 20px; border-radius: 50px; border: 1px solid #222; box-sizing: border-box; }
        .mes-btn { background: none; color: #4285F4; border: none; font-size: 1.8rem; cursor: pointer; transition: 0.3s; padding: 0 15px; line-height: 1; }
        .mes-btn:hover { color: white; transform: scale(1.3); }
        #mes-extenso { font-size: 1rem; font-weight: bold; text-transform: capitalize; color: #fff; text-align: center; flex-grow: 1; min-width: 120px; }
        
        .filtros { display: flex; gap: 8px; margin-bottom: 20px; }
        .filter-btn { background: #111; color: #666; padding: 10px 20px; border-radius: 30px; font-size: 0.8rem; border: 1px solid #222; cursor: pointer; transition: 0.3s; }
        .filter-btn.active { background: #4285F4; color: white; border-color: #4285F4; }

        .historico { width: 360px; }
        .item { background: #111; padding: 18px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #222; }
        .btn-del { background: none; color: #444; border: none; cursor: pointer; font-size: 1.2rem; }
        
        .btn-google { background: #fff; color: #000; width: 320px; margin-bottom: 20px; border-radius: 15px; padding: 15px; font-weight: bold; cursor: pointer; border: none; }
        #perfil { margin-bottom: 15px; font-size: 0.8rem; color: #888; display: none; }

        /* SEÇÃO DO PIX DISCRETO */
        .footer-pix { 
            margin-top: 50px; 
            padding: 20px; 
            text-align: center; 
            font-size: 0.8rem; 
            color: #666; 
            cursor: pointer; 
            transition: 0.3s;
            border-radius: 15px;
        }
        .footer-pix:hover { color: #f3ba2f; background: #111; }
        .footer-pix b { color: #eee; }
        #pix-copy-status { 
            display: block; 
            font-size: 0.7rem; 
            margin-top: 8px; 
            color: #02c076; 
            opacity: 0; 
            transition: 0.3s; 
            font-weight: bold;
        }
    </style>
</head>
<body>

    <button id="login-google" class="btn-google">Entrar com Google</button>
    <div id="perfil">Conectado como: <span id="user-name"></span></div>

    <div class="card-saldo">
        <small style="color: #555;">Saldo Total</small>
        <h1 id="valor-saldo">R$ 0,00</h1>
    </div>

    <div class="card-input">
        <input type="text" id="desc" placeholder="Descrição">
        <input type="text" id="valor" placeholder="R$ 0,00">
        <div class="botoes">
            <button id="btn-recebi" class="btn-recebi">RECEBI</button>
            <button id="btn-gastei" class="btn-gastei">GASTEI</button>
        </div>
    </div>

    <div class="navegacao-mes">
        <button id="prev-mes" class="mes-btn">‹</button>
        <span id="mes-extenso">...</span>
        <button id="next-mes" class="mes-btn">›</button>
    </div>

    <div class="filtros">
        <button id="f-todos" class="filter-btn active">Tudo</button>
        <button id="f-ganhos" class="filter-btn">Ganhos</button>
        <button id="f-gastos" class="filter-btn">Gastos</button>
    </div>

    <div class="historico">
        <div id="lista"></div>
    </div>

    <div class="footer-pix" id="btn-pix">
        Apoie o desenvolvedor: <br>
        <b>Chave Pix (E-mail):</b> <span id="chave-pix">desouzanunes10o@gmail.com</span>
        <span id="pix-copy-status">✓ Chave copiada! Abra o app do seu banco.</span>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAVEXSgz2TX3WnRlzRlUK_Rj8CXe72OZa4",
            authDomain: "projeto-finance-cedc4.firebaseapp.com",
            projectId: "projeto-finance-cedc4",
            storageBucket: "projeto-finance-cedc4.firebasestorage.app",
            messagingSenderId: "83128434935",
            appId: "1:83128434935:web:1e9a8fe04906e3d9fc53f2"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        enableIndexedDbPersistence(db).catch(() => {});

        let dados = { saldo: 0, lista: [] };
        let usuarioAtual = null;
        let filtroTipo = 'todos';
        let dataVisualizacao = new Date();

        // Lógica de Copiar Pix
        document.getElementById('btn-pix').onclick = () => {
            const chave = document.getElementById('chave-pix').innerText;
            navigator.clipboard.writeText(chave).then(() => {
                const status = document.getElementById('pix-copy-status');
                status.style.opacity = '1';
                setTimeout(() => status.style.opacity = '0', 3000);
            });
        };

        const atualizarTela = () => {
            document.getElementById('mes-extenso').innerText = dataVisualizacao.toLocaleDateString('pt-br', { month: 'long', year: 'numeric' });
            document.getElementById('valor-saldo').innerText = dados.saldo.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
            document.getElementById('valor-saldo').style.color = dados.saldo >= 0 ? "#2ecc71" : "#e74c3c";
            const elLista = document.getElementById('lista');
            elLista.innerHTML = "";
            const filtrados = dados.lista.filter(item => {
                const d = new Date(item.id);
                return d.getMonth() === dataVisualizacao.getMonth() && d.getFullYear() === dataVisualizacao.getFullYear();
            }).filter(item => {
                if (filtroTipo === 'todos') return true;
                return filtroTipo === 'ganho' ? item.tipo === true : item.tipo === false;
            });
            [...filtrados].reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'item';
                div.style.borderLeft = `5px solid ${item.tipo ? '#2ecc71' : '#e74c3c'}`;
                div.innerHTML = `<div><b>${item.texto}</b><br><span>${item.num.toLocaleString('pt-br', {style:'currency', currency:'BRL'})}</span></div><button class="btn-del" data-id="${item.id}">✕</button>`;
                elLista.appendChild(div);
            });
            document.querySelectorAll('.btn-del').forEach(b => b.onclick = () => apagar(Number(b.dataset.id)));
        };

        const apagar = async (id) => {
            const item = dados.lista.find(i => i.id === id);
            if (!item) return;
            dados.saldo = item.tipo ? dados.saldo - item.num : dados.saldo + item.num;
            dados.lista = dados.lista.filter(i => i.id !== id);
            if (usuarioAtual) await setDoc(doc(db, "usuarios", usuarioAtual), dados);
            atualizarTela();
        };

        const adicionar = async (ehGanho) => {
            const desc = document.getElementById('desc');
            const val = document.getElementById('valor');
            let num = parseFloat(val.value.replace("R$ ", "").replace(/\./g, "").replace(",", "."));
            if (!desc.value || isNaN(num)) return;
            dados.saldo = ehGanho ? dados.saldo + num : dados.saldo - num;
            dados.lista.push({ id: Date.now(), texto: desc.value, num: num, tipo: ehGanho });
            desc.value = ""; val.value = "";
            if (usuarioAtual) await setDoc(doc(db, "usuarios", usuarioAtual), dados);
            atualizarTela();
        };

        const selecionarFiltro = (id, tipo) => {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            filtroTipo = tipo;
            atualizarTela();
        };

        document.getElementById('f-todos').onclick = () => selecionarFiltro('f-todos', 'todos');
        document.getElementById('f-ganhos').onclick = () => selecionarFiltro('f-ganhos', 'ganho');
        document.getElementById('f-gastos').onclick = () => selecionarFiltro('f-gastos', 'gasto');
        document.getElementById('prev-mes').onclick = () => { dataVisualizacao.setMonth(dataVisualizacao.getMonth() - 1); atualizarTela(); };
        document.getElementById('next-mes').onclick = () => { dataVisualizacao.setMonth(dataVisualizacao.getMonth() + 1); atualizarTela(); };
        document.getElementById('btn-recebi').onclick = () => adicionar(true);
        document.getElementById('btn-gastei').onclick = () => adicionar(false);
        document.getElementById('valor').oninput = (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2).replace(".", ",").replace(/(\d)(\d{3}),/g, "$1.$2,");
            e.target.value = "R$ " + v;
        };
        document.getElementById('login-google').onclick = () => signInWithPopup(auth, provider);
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                usuarioAtual = user.uid;
                document.getElementById('login-google').style.display = 'none';
                document.getElementById('perfil').style.display = 'block';
                document.getElementById('user-name').innerText = user.displayName;
                const snap = await getDoc(doc(db, "usuarios", usuarioAtual));
                if (snap.exists()) dados = snap.data();
                atualizarTela();
            }
        });
    </script>
</body>
</html>
